<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Direct To UCS — Flights</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: rgba(22,22,22,0.90);
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --text-muted: #666;
    --btn-bg: #f0f0f0;
    --btn-text: #0d0d0d;
    --shadow: 0 2px 24px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.3);
    --topbar-bg: rgba(13,13,13,0.85);
    --input-border: rgba(255,255,255,0.12);
    --input-bg: rgba(255,255,255,0.05);
    --input-focus: rgba(255,255,255,0.4);
  }
  body.light {
    --bg: #ffffff;
    --surface: rgba(255,255,255,0.88);
    --border: rgba(0,0,0,0.08);
    --text: #0a0a0a;
    --text-muted: #888;
    --btn-bg: #0a0a0a;
    --btn-text: #ffffff;
    --shadow: 0 2px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
    --topbar-bg: rgba(255,255,255,0.82);
    --input-border: rgba(0,0,0,0.13);
    --input-bg: rgba(255,255,255,0.9);
    --input-focus: #0a0a0a;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s;
  }

  #canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* ── TOPBAR ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center;
    padding: 16px 36px;
    background: var(--topbar-bg);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 2px 16px rgba(0,0,0,0.2);
    transition: background 0.3s;
  }
  .topbar-logo { display: flex; flex-direction: column; }
  .topbar-logo .co { font-size: 9px; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; color: var(--text-muted); }
  .topbar-logo .name { font-size: 20px; font-weight: 700; letter-spacing: -0.03em; color: var(--text); line-height: 1.1; }
  .topbar-logo .tagline { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  .topbar-user { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); }

  .theme-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 13px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--text-muted); cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.05em;
  }
  .theme-btn:hover { color: var(--text); border-color: var(--input-focus); }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(18px); }

  /* ── LOGIN ── */
  .login-wrap { position: fixed; top: 20px; right: 20px; z-index: 200; }
  .login-wrap .theme-btn { background: var(--surface); backdrop-filter: blur(10px); }

  .login-card {
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 52px 48px 44px;
    width: 420px;
    box-shadow: var(--shadow);
    text-align: center;
    transition: background 0.3s;
  }
  .login-card .brand { font-size: 11px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .login-card h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text); margin-bottom: 6px; }
  .login-card .sub { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
  .login-card input {
    width: 100%; border: 1.5px solid var(--input-border); border-radius: 10px;
    padding: 14px 18px; font-family: 'DM Mono', monospace; font-size: 15px;
    color: var(--text); background: var(--input-bg);
    outline: none; transition: border-color 0.2s, background 0.3s, color 0.3s;
    margin-bottom: 14px;
  }
  .login-card input:focus { border-color: var(--input-focus); }
  .login-card input::placeholder { color: var(--text-muted); }
  .login-card button {
    width: 100%; background: var(--btn-bg); color: var(--btn-text);
    border: none; border-radius: 10px; padding: 14px;
    font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600;
    letter-spacing: 0.04em; cursor: pointer;
    transition: opacity 0.18s, transform 0.1s; box-shadow: var(--shadow);
  }
  .login-card button:hover { opacity: 0.85; }
  .login-card button:active { transform: scale(0.98); }

  /* ── BOOKING ── */
  #booking-screen { flex-direction: column; align-items: stretch; justify-content: flex-start; overflow-y: auto; }

  .booking-body {
    margin-top: 80px;
    display: flex; align-items: flex-start; justify-content: center;
    min-height: calc(100vh - 80px);
    padding: 40px 20px;
    position: relative; z-index: 10;
  }

  .booking-card {
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 40px 32px;
    width: 660px;
    max-width: 100%;
    box-shadow: var(--shadow);
    transition: background 0.3s;
  }
  .booking-card h2 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text); margin-bottom: 4px; }
  .booking-card .card-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 28px; font-family: 'DM Mono', monospace; }

  /* ── IFRAME WRAPPER ── */
  .form-wrap {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    /* Crop Google's header/footer */
    height: 560px;
  }

  .form-wrap iframe {
    width: 100%;
    height: 760px;
    border: none;
    margin-top: -120px; /* hide Google header */
    display: block;
    /* dark mode invert trick */
    transition: filter 0.3s;
  }

  /* Dark mode: invert the iframe so Google's white form becomes dark */
  body:not(.light) .form-wrap iframe {
    filter: invert(1) hue-rotate(180deg);
  }

  /* glass-overlay */
  #glass-overlay { position: fixed; inset: 0; z-index: 5; pointer-events: none; opacity: 0.15; }
  #glass-overlay div { width: 100%; height: 100%; filter: url(#container-glass); }
  .glass-svg { display: none; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="glass-overlay"><div></div></div>
<svg class="glass-svg">
  <defs>
    <filter id="container-glass" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="2" seed="92" result="noise"/>
      <feGaussianBlur in="noise" stdDeviation="0.02" result="blur"/>
      <feDisplacementMap in="SourceGraphic" in2="blur" scale="77" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- Login page theme btn -->
<div class="login-wrap">
  <button class="theme-btn" id="login-theme-btn" onclick="toggleTheme()">☀ light</button>
</div>

<!-- LOGIN SCREEN -->
<div class="screen" id="login-screen">
  <div class="login-card">
    <div class="brand">Direct To UCS</div>
    <h1>Flight Portal</h1>
    <p class="sub">Enter your callsign to continue</p>
    <input type="text" id="login-username" placeholder="callsign / username" autocomplete="off"/>
    <button onclick="doLogin()">Enter →</button>
  </div>
</div>

<!-- BOOKING SCREEN -->
<div class="screen hidden" id="booking-screen">
  <div class="topbar">
    <div class="topbar-logo">
      <span class="co">Direct To UCS</span>
      <span class="name">Flights</span>
      <span class="tagline">secure transport · anytime · anywhere</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user">pilot: <span id="display-user"></span></span>
      <button class="theme-btn" id="topbar-theme-btn" onclick="toggleTheme()">☀ light</button>
    </div>
  </div>

  <div class="booking-body">
    <div class="booking-card">
      <h2>Request a Flight</h2>
      <p class="card-sub">complete the form below to dispatch your transport</p>
      <div class="form-wrap">
        <iframe
          id="gform"
          src="https://docs.google.com/forms/d/e/1FAIpQLSfHohpah3xZh8vtnS8-LtnUpeznhN7ocMuO69_xWmS1682gTQ/viewform?embedded=true"
          frameborder="0"
          marginheight="0"
          marginwidth="0">
          Loading…
        </iframe>
      </div>
    </div>
  </div>
</div>

<script>
// ── THEME ──
let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  const label = isDark ? '☀ light' : '🌙 dark';
  document.getElementById('login-theme-btn').textContent = label;
  document.getElementById('topbar-theme-btn').textContent = label;
  localStorage.setItem('ucs_theme', isDark ? 'dark' : 'light');
}

// ── NODES ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let nodes = [];
const NODE_COUNT = 65, MAX_DIST = 155;
for (let i = 0; i < NODE_COUNT; i++) {
  nodes.push({ x: Math.random()*innerWidth, y: Math.random()*innerHeight, vx:(Math.random()-.5)*.45, vy:(Math.random()-.5)*.45, r:Math.random()*2+2 });
}
function drawNodes() {
  const W = canvas.width = innerWidth, H = canvas.height = innerHeight;
  ctx.clearRect(0,0,W,H);
  const dark = !document.body.classList.contains('light');
  const rgb = dark ? '210,210,210' : '10,10,10';
  const fill = dark ? 'rgba(210,210,210,0.65)' : 'rgba(10,10,10,0.55)';
  for (let n of nodes) {
    n.x += n.vx; n.y += n.vy;
    if (n.x<0||n.x>W) n.vx*=-1;
    if (n.y<0||n.y>H) n.vy*=-1;
  }
  for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++) {
    const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y, d=Math.hypot(dx,dy);
    if (d<MAX_DIST) { ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); ctx.strokeStyle=`rgba(${rgb},${(1-d/MAX_DIST)*.2})`; ctx.lineWidth=1; ctx.stroke(); }
  }
  for (let n of nodes) { ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fillStyle=fill; ctx.fill(); }
  requestAnimationFrame(drawNodes);
}
drawNodes();

// ── AUTH ──
function doLogin() {
  const u = document.getElementById('login-username').value.trim();
  if (!u) return;
  localStorage.setItem('ucs_user', u);
  document.getElementById('display-user').textContent = u;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('booking-screen').classList.remove('hidden');
}
document.getElementById('login-username').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  const t = localStorage.getItem('ucs_theme');
  if (t === 'light') {
    isDark = false;
    document.body.classList.add('light');
    document.getElementById('login-theme-btn').textContent = '🌙 dark';
    document.getElementById('topbar-theme-btn').textContent = '🌙 dark';
  }
  const u = localStorage.getItem('ucs_user');
  if (u) document.getElementById('login-username').value = u;
});
</script>
</body>
</html>
