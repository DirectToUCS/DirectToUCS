<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Very Important Document</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; width: 100vw; height: 100vh; font-family: Arial, sans-serif; }

    #landing {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      z-index: 99999;
      cursor: pointer;
      gap: 24px;
    }

    #landing h1 {
      color: #fff;
      font-size: 2rem;
      text-align: center;
    }

    #landing p {
      color: #aaa;
      font-size: 1rem;
    }

    #enter-btn {
      background: #e63946;
      color: white;
      border: none;
      padding: 18px 48px;
      font-size: 1.3rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 30px #e6394688;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px #e6394688; }
      50% { box-shadow: 0 0 60px #e63946cc; }
    }

    #video-container {
      display: none;
      position: fixed;
      inset: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Blocks all clicks on the video */
    #blocker {
      position: fixed;
      inset: 0;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <div id="landing" onclick="startRoll()">
    <h1>📄 flights</h1>
    <p>You have been sent a very important file.</p>
    <button id="enter-btn">Click to View</button>
  </div>

  <div id="video-container">
    <iframe id="yt"
      src=""
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
    <div id="blocker"></div>
  </div>

  <script>
    function startRoll() {
      document.getElementById('landing').style.display = 'none';
      document.getElementById('video-container').style.display = 'block';
      document.getElementById('yt').src =
        'https://www.youtube.com/embed/QDia3e12czc?autoplay=1&controls=0&loop=1&playlist=QDia3e12czc&modestbranding=1&disablekb=1&fs=0&iv_load_policy=3';
    }
  </script>

</body>
</html>
